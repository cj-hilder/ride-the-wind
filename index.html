<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#12152b" />

    <title>Ride the Wind — wind-aware bike commute timing</title>
    <meta name="description" content="Free and open source. Predicts your bike commute time from forecast wind on your exact route — gives a range of ride times and tells you when to leave to arrive on time." />
    <meta name="author" content="Chris Hilder" />
    <meta name="keywords" content="bike commute, cycling, headwind, tailwind, wind forecast, commute time, ride time, PWA, open source" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://ridethewind.nz/" />

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Ride the Wind" />
    <meta property="og:title" content="Ride the Wind — wind-aware bike commute timing" />
    <meta property="og:description" content="Free and open source. Predicts your bike commute time from forecast wind on your exact route. Uses multiple forecasts to give a range of ride times. Tells you when to leave to arrive on time. Made in New Zealand, works anywhere in the world." />
    <meta property="og:url" content="https://ridethewind.nz/" />
    <meta property="og:image" content="https://ridethewind.nz/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Ride the Wind — koru logo beside the app name" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Ride the Wind — wind-aware bike commute timing" />
    <meta name="twitter:description" content="Free and open source. Predicts your bike commute time from forecast wind on your exact route. Uses multiple forecasts to give a range of ride times. Tells you when to leave to arrive on time. Made in New Zealand, works anywhere in the world." />
    <meta name="twitter:image" content="https://ridethewind.nz/og-image.png" />

    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Ride the Wind" />

    <!-- Structured data: helps search engines understand this is a free web app -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Ride the Wind",
      "url": "https://ridethewind.nz/",
      "description": "Free and open source. Predicts your bike commute time from forecast wind on your exact route — gives a range of ride times and tells you when to leave to arrive on time.",
      "applicationCategory": "LifestyleApplication",
      "operatingSystem": "Any (Progressive Web App)",
      "author": { "@type": "Person", "name": "Chris Hilder" },
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "isAccessibleForFree": true
    }
    </script>

    <style>
      html, body, #root { height: 100dvh; margin: 0; background: #111; overflow: hidden; }
      body { overscroll-behavior: none; -webkit-text-size-adjust: 100%; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
